  <!-- Circuit nodes overlay (AI motif) -->
  <circle cx="22" cy="30" r="1.8" fill="#eafff5"/>
  <circle cx="30" cy="23" r="1.8" fill="#eafff5"/>
  <circle cx="38" cy="30" r="1.8" fill="#eafff5"/>
  <circle cx="28" cy="40" r="1.8" fill="#eafff5"/>
  <line x1="22" y1="30" x2="30" y2="23" stroke="#eafff5" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="23" x2="38" y2="30" stroke="#eafff5" stroke-width="1" opacity="0.7"/>
  <line x1="22" y1="30" x2="28" y2="40" stroke="#eafff5" stroke-width="1" opacity="0.7"/>

  <!-- Small CO2-reduction arrow -->
  <path d="M46 46 L52 40 M52 40 L52 45 M52 40 L47 40"
        stroke="#a8f0d8" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
